name: Robot Framework API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
      - name: Run 100% Spec Compliant Robot Tests
        run: |
          docker-compose -f tests/robot/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from robot-runner
        continue-on-error: false

      - name: Show Docker Logs on Failure
        if: failure()
        run: |
          docker-compose -f tests/robot/docker-compose.test.yml logs test-backend

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-results
          path: |
            tests/robot/log.html
            tests/robot/report.html
            tests/robot/output.xml
          retention-days: 30
